# ==========================================================
# Application
# ==========================================================
spring.application.name=auth-service
server.port=${PORT:8080}

# ==========================================================
# Datasource
# Defaults to PostgreSQL in production; override via env vars.
# For local/dev without a DB, set SPRING_PROFILES_ACTIVE=dev (uses H2).
# ==========================================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/authdb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================================
# JWT
# IMPORTANT: APP_JWT_SECRET must be set as an environment variable
# in production. The default below is for local development only.
# ==========================================================
app.jwt.secret=${APP_JWT_SECRET:change-me-in-production-this-is-a-dev-only-secret-key-256bits}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ==========================================================
# CORS - allowed frontend origins (comma separated)
# ==========================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ==========================================================
# Actuator
# ==========================================================
management.endpoints.web.exposure.include=health,info
